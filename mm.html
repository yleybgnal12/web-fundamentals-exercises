<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CityWide Rental - Access Gateway</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;800&family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="mm.css" />
  </head>
  <body style="display: flex; flex-direction: column; min-height: 100vh">
    <nav>
      <div
        class="logo"
        onclick="window.location.href = 'ma.html'"
        style="cursor: pointer"
      >
        CityWide <span>Rental</span>
      </div>
      <ul>
        <li><a href="ma.html">Home</a></li>
        <li><a href="ma.html#rentals">Featured Gear</a></li>
        <li><a href="ma.html#about">About Platform</a></li>
      </ul>
    </nav>

    <section
      class="auth-section container my-auto py-5"
      style="flex: 1; display: flex; align-items: center"
    >
      <div class="auth-container">
        <div class="auth-box login-box">
          <h2>Sign In</h2>
          <p>Access Secure Dashboard</p>
          <form action="#" method="POST">
            <div class="form-group mb-3">
              <label for="login-email" class="form-label"
                >SECURE EMAIL ADDRESS</label
              >
              <input
                type="email"
                class="form-control bg-dark text-white border-secondary"
                id="login-email"
                required
                placeholder="example@domain.com"
                oninvalid="
                  this.setCustomValidity(
                    'Please enter a valid email address (e.g., name@mail.com)!',
                  )
                "
                oninput="this.setCustomValidity('')"
              />
            </div>
            <div class="form-group mb-4">
              <label for="login-password" class="form-label">PASSWORD</label>
              <input
                type="password"
                class="form-control bg-dark text-white border-secondary"
                id="login-password"
                required
                placeholder="Enter your password"
                oninvalid="
                  this.setCustomValidity('Password is required to sign in!')
                "
                oninput="this.setCustomValidity('')"
              />
            </div>
            <button type="submit" class="btn-submit">Verify Session</button>
          </form>
        </div>

        <div class="auth-divider"></div>

        <div class="auth-box register-box">
          <h2>Register</h2>
          <p>Initialize Node Account</p>
          <form action="#" method="POST">
            <div class="form-group mb-3">
              <label for="reg-name" class="form-label">FULL ACCOUNT NAME</label>
              <input
                type="text"
                class="form-control bg-dark text-white border-secondary"
                id="reg-name"
                required
                placeholder="Mahlet ..."
                oninvalid="
                  this.setCustomValidity('Please enter your full account name!')
                "
                oninput="this.setCustomValidity('')"
              />
            </div>

            <div class="form-group mb-3">
              <label for="reg-email" class="form-label"
                >VALID EMAIL ADDRESS</label
              >
              <input
                type="email"
                class="form-control bg-dark text-white border-secondary"
                id="reg-email"
                required
                placeholder="intern@domain.com"
                oninvalid="
                  this.setCustomValidity(
                    'Please include an @ in the email address!',
                  )
                "
                oninput="this.setCustomValidity('')"
              />
            </div>

            <div class="form-group mb-3">
              <label for="reg-phone" class="form-label">PHONE NUMBER</label>
              <input
                type="tel"
                class="form-control bg-dark text-white border-secondary"
                id="reg-phone"
                required
                pattern="[0-9]+"
                placeholder="0911......"
                oninvalid="
                  this.setCustomValidity(
                    'Please enter numbers only! Characters are not allowed.',
                  )
                "
                oninput="this.setCustomValidity('')"
              />
            </div>

            <div class="form-group mb-3">
              <label for="reg-password" class="form-label"
                >SECURE PASSWORD</label
              >
              <input
                type="password"
                class="form-control bg-dark text-white border-secondary"
                id="reg-password"
                required
                placeholder="Create strong password"
                oninvalid="
                  this.setCustomValidity(
                    'Please create a strong secure password!',
                  )
                "
                oninput="this.setCustomValidity('')"
              />
            </div>

            <div class="form-group mb-4">
              <label for="reg-role" class="form-label"
                >PRIMARY SYSTEM PERMISSION TIER</label
              >
              <select
                id="reg-role"
                class="form-select bg-dark text-white border-secondary"
                required
                oninvalid="
                  this.setCustomValidity(
                    'Please select a system role from the list!',
                  )
                "
                oninput="this.setCustomValidity('')"
              >
                <option value="" disabled selected style="color: gray">
                  Select system role
                </option>
                <option value="both">
                  Dual-Role (Pivot as both Lessor & Lessee)
                </option>
                <option value="lessee">
                  Lessee (Asset Consumer / Renter Only)
                </option>
                <option value="lessor">
                  Lessor (Asset Supplier / Owner Only)
                </option>
              </select>
            </div>

            <button type="submit" class="btn-submit btn-reg">
              Initialize Account
            </button>
          </form>
        </div>
      </div>
    </section>

    <footer>
      <p>
        © 2026 CityWide Rental Software Engineering Consortium | Built with ❤️
        by our Team | All Rights Reserved
      </p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
